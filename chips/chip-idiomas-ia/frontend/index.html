<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Idiomas IA | OmniWeb</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a modern, educational aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <!-- Header -->
        <header class="top-nav">
            <button id="btn-back" class="icon-btn back-btn" aria-label="Volver">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <div class="nav-branding">
                <span class="chip-icon">🌐</span>
                <h1 class="nav-title">Mentor de Idiomas</h1>
            </div>
            <div class="nav-spacer"></div>
        </header>

        <!-- Main Content (Input & Output) -->
        <main class="content-area">

            <!-- Config / Language Selection -->
            <div class="lang-selector-card">
                <div class="lang-group">
                    <label>De:</label>
                    <select id="source-lang" class="lang-select">
                        <option value="auto">Detectar Automático</option>
                        <option value="es">Español</option>
                        <option value="en">Inglés</option>
                        <option value="ja">Japonés</option>
                    </select>
                </div>
                <button id="btn-swap-lang" class="icon-btn swap-btn" aria-label="Intercambiar Idiomas">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
                <div class="lang-group">
                    <label>A:</label>
                    <select id="target-lang" class="lang-select">
                        <option value="en">Inglés</option>
                        <option value="es">Español</option>
                        <option value="ja">Japonés</option>
                    </select>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-card">
                <textarea id="text-input" class="text-input"
                    placeholder="Escribe algo para traducir y aprender..."></textarea>
                <div class="input-actions">
                    <button class="icon-btn mic-btn" title="Entrada por voz (Futuro)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2v10m-4-5v5a4 4 0 008 0v-5M8 19h8M12 19v3" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                    <button id="btn-translate" class="btn btn-primary">Traducir</button>
                </div>
            </div>

            <!-- Output Modules (Bilingual output) -->
            <div id="output-container" class="output-container hidden">

                <div class="output-module primary-translation">
                    <div class="module-header">
                        <span class="module-label" id="label-traduccion">Traducción</span>
                        <button class="icon-btn small-btn" title="Escuchar (Futuro)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                    <p id="out-translation" class="module-text large-text">Hello context</p>
                </div>

                <div class="output-module educational">
                    <div class="module-header">
                        <span class="module-label">Transliteración (Lectura)</span>
                    </div>
                    <p id="out-transliteration" class="module-text mono-text">he-lo kon-tekst</p>
                </div>

                <div class="output-module educational">
                    <div class="module-header">
                        <span class="module-label">Pronunciación Aproximada</span>
                    </div>
                    <p id="out-pronunciation" class="module-text">/helóu kóntext/</p>
                </div>

                <div class="output-module original">
                    <div class="module-header">
                        <span class="module-label" id="label-original">Texto Original</span>
                    </div>
                    <p id="out-original" class="module-text text-muted">Hola contexto</p>
                </div>

            </div>

        </main>

    </div>

    <!-- Modulo de App con importaciones de Core -->
    <script type="module" src="app.js"></script>
</body>

</html>
