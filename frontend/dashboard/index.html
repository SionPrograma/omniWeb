<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniWeb | Personal Knowledge Environment</title>
    <style>
        :root {
            --bg-color: #050508;
            --accent-color: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
        }

        /* Ambient Stars */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.2);
            }
        }

        /* Header section */
        header {
            text-align: center;
            z-index: 10;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.3));
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: lowercase;
            font-style: italic;
        }

        /* Chips Grid */
        .chips-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            z-index: 10;
            perspective: 1000px;
        }

        .chip {
            width: 180px;
            height: 100px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            position: relative;
            animation: float var(--float-duration) infinite ease-in-out;
            animation-delay: var(--float-delay);
        }

        .chip:hover {
            transform: scale(1.1) translateZ(20px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .chip-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chip-status {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chip.coming-soon {
            cursor: default;
            opacity: 0.8;
        }

        .chip.coming-soon:hover {
            transform: none;
            border-color: var(--glass-border);
            box-shadow: none;
        }

        .chip.active {
            border-color: rgba(0, 212, 255, 0.5);
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        /* AI Host Panel */
        .ai-panel {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 350px;
            height: 450px;
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .ai-header {
            padding: 1.2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }

        .ai-chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            color: #eee;
            border-bottom-left-radius: 2px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-color);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }

        .ai-input-area {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        input#ai-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 15px;
            color: white;
            outline: none;
        }

        input#ai-input:focus {
            border-color: var(--accent-color);
        }

        #send-btn {
            background: var(--accent-color);
            color: black;
            border: none;
            border-radius: 12px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* System Insights Panel */
        .insights-panel {
            position: fixed;
            top: 2rem;
            left: 2rem;
            width: 300px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            padding: 1.5rem;
            z-index: 50;
        }

        .insights-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .insight-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .insight-label {
            opacity: 0.6;
        }

        /* Improvement Proposals Panel */
        .proposals-panel {
            position: fixed;
            top: 21rem;
            /* Below insights */
            left: 2rem;
            width: 300px;
            background: rgba(40, 30, 60, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            padding: 1.5rem;
            z-index: 50;
        }

        .proposal-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent-color);
        }

        /* User Context Panel */
        .user-context-panel {
            position: fixed;
            top: 21rem;
            /* Grouped with proposals */
            left: 21rem;
            /* Beside proposals */
            width: 300px;
            background: rgba(20, 40, 60, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            padding: 1.5rem;
            z-index: 50;
        }

        /* Mobile Adjustments */
        @media (max-width: 1200px) {
            .user-context-panel {
                left: 2rem;
                top: 40rem;
            }
        }

        @media (max-width: 600px) {
            .chips-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.5rem;
            }

            .ai-panel {
                width: calc(100% - 2rem);
                right: 1rem;
                bottom: 1rem;
                height: 350px;
            }

            .insights-panel,
            .proposals-panel,
            .user-context-panel {
                display: none;
                /* Hide on small screens for clarity */
            }
        }
    </style>
</head>

<body>
    <div class="stars-container" id="stars"></div>

    <header>
        <h1>OmniWeb</h1>
        <div class="subtitle">Personal Knowledge Environment</div>
        <div class="version-badge"
            style="margin-top: 10px; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;">v0.6.0-stable</div>
    </header>

    <!-- Insights Panel -->
    <div class="insights-panel">
        <div class="insights-title">System Insights</div>
        <div id="insights-content">
            <div class="insight-item">
                <span class="insight-label">Analizando...</span>
            </div>
        </div>
    </div>

    <!-- Proposals Panel -->
    <div class="proposals-panel">
        <div class="insights-title">AI Suggestions</div>
        <div id="proposals-content">
            <div style="font-size: 0.8rem; opacity: 0.6;">Sin sugerencias por ahora. El sistema está observando tu uso.
            </div>
        </div>
    </div>

    <!-- User Context Panel -->
    <div class="user-context-panel">
        <div class="insights-title">User Behavior</div>
        <div id="context-content">
            <div style="font-size: 0.8rem; opacity: 0.6;">Analizando patrones...</div>
        </div>
    </div>

    <main class="chips-container" id="chips-grid">
        <!-- Chips will be loaded dynamically here -->
    </main>

    <!-- AI Host Panel -->
    <div class="ai-panel">
        <div class="ai-header">
            <div class="ai-status-dot"></div>
            <span style="font-weight: 600; font-size: 0.9rem;">AI HOST</span>
            <div id="ai-multimodal-indicator"
                style="margin-left: auto; font-size: 0.7rem; color: var(--accent-color); opacity: 0;">Escuchando...
            </div>
        </div>
        <div class="ai-chat-history" id="chat-history">
            <div class="message ai">¡Hola! Soy tu asistente de OmniWeb. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div id="ai-visual-response" style="padding: 0 1rem; margin-bottom: 10px;"></div>
        <div class="ai-input-area">
            <button id="voice-btn" title="Voice Input"
                style="background: none; border: 1px solid var(--glass-border); border-radius: 50%; width: 40px; height: 40px; color: white; cursor: pointer; transition: 0.3s;"><i
                    class="fas fa-microphone"></i>🎤</button>
            <input type="text" id="ai-input" placeholder="Escribe un comando...">
            <button id="send-btn">→</button>
        </div>
    </div>


    <script>
        // DOM Elements
        const chipsGrid = document.getElementById('chips-grid');

        // Logic: Load Chips from API
        async function loadChips() {
            try {
                const response = await fetch('/api/v1/system/chips');
                if (!response.ok) throw new Error('API unstable');

                const chips = await response.ok ? await response.json() : [];
                renderChips(chips);
            } catch (error) {
                console.warn('Using manual fallback due to API error:', error);
                // No need to clear grid, if API fails we could show a message or just leave it empty
                // In a real app, we might have a hardcoded fallback list here.
            }
        }

        function renderChips(chips) {
            chipsGrid.innerHTML = ''; // Clear skeleton/existing

            // Filter only visible chips
            const visibleChips = chips.filter(c => c.metadata?.dashboard_visible !== false);

            visibleChips.forEach((chip, index) => {
                const card = document.createElement('a');
                card.href = chip.prefix ? `/${chip.slug}/` : '#';
                card.className = `chip ${chip.status === 'active' || chip.status === 'frontend-only' ? 'active' : 'placeholder'}`;

                // Random float delays for natural feel
                const duration = 5 + Math.random() * 3;
                const delay = Math.random() * 2;
                card.style.setProperty('--float-duration', `${duration}s`);
                card.style.setProperty('--float-delay', `${delay}s`);

                // Use metadata name if available, otherwise slug
                const displayName = chip.metadata?.name || chip.name || chip.slug;
                const displayStatus = chip.metadata?.type === 'placeholder' ? 'Base Ready' : (chip.status === 'active' ? 'Active' : 'Offline');

                card.innerHTML = `
                    <span class="chip-title">${displayName}</span>
                    <span class="chip-status">${displayStatus}</span>
                `;

                if (chip.metadata?.type === 'placeholder') {
                    card.classList.add('coming-soon');
                    card.removeAttribute('href');
                }

                chipsGrid.appendChild(card);
            });

            highlightRecent();
        }

        function highlightRecent() {
            const lastSession = localStorage.getItem('omniweb_last_session');
            if (lastSession) {
                const lastChip = document.querySelector(`a[href="/${lastSession}/"]`);
                if (lastChip) {
                    lastChip.style.borderColor = "rgba(52, 211, 153, 0.8)";
                    lastChip.style.boxShadow = "0 0 15px rgba(52, 211, 153, 0.3)";
                    const statusText = lastChip.querySelector('.chip-status');
                    if (statusText) statusText.innerText = "Reciente";
                }
            }
        }

        // Generate stars
        const starsContainer = document.getElementById('stars');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const size = Math.random() * 2 + 1;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 3 + 2;

            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.setProperty('--duration', `${duration}s`);

            starsContainer.appendChild(star);
        }

        // Add some mouse follow effect for depth
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            const container = document.querySelector('.chips-container');
            if (container) {
                container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // AI Host Logic
        const chatHistory = document.getElementById('chat-history');
        const aiInput = document.getElementById('ai-input');
        const sendBtn = document.getElementById('send-btn');

        // Insights & Proposals Logic
        const insightsContent = document.getElementById('insights-content');
        const proposalsContent = document.getElementById('proposals-content');
        const contextContent = document.getElementById('context-content');

        async function loadInsights() {
            try {
                const response = await fetch('/api/v1/system/usage');
                if (!response.ok) return;

                const data = await response.json();
                const usage = data.usage;

                let html = `
                    <div class="insight-item">
                        <span class="insight-label">Total Eventos</span>
                        <span>${usage.total_events}</span>
                    </div>
                `;

                if (usage.top_chips.length > 0) {
                    html += `<div style="margin-top: 1rem; margin-bottom: 0.5rem; font-size: 0.7rem; opacity: 0.5;">TOP CHIPS</div>`;
                    usage.top_chips.forEach(chip => {
                        html += `
                            <div class="insight-item">
                                <span class="insight-label">${chip.slug || 'system'}</span>
                                <span>${chip.count}</span>
                            </div>
                        `;
                    });
                }

                insightsContent.innerHTML = html;
            } catch (error) {
                console.warn('Insights failed:', error);
            }
        }

        async function loadProposals() {
            try {
                const response = await fetch('/api/v1/system/proposals');
                if (!response.ok) return;

                const data = await response.json();
                const proposals = data.proposals;

                if (proposals.length === 0) {
                    proposalsContent.innerHTML = '<div style="font-size: 0.8rem; opacity: 0.6;">Sin sugerencias por ahora. El sistema está observando tu uso.</div>';
                    return;
                }

                let html = '';
                proposals.forEach(p => {
                    html += `
                        <div class="proposal-card">
                            <strong>${p.proposal_type.replace('_', ' ').toUpperCase()}</strong>
                            <p style="margin: 5px 0;">${p.description}</p>
                            <span style="font-size: 0.7rem; color: var(--accent-color); cursor: pointer; text-decoration: underline;">Detalles</span>
                        </div>
                    `;
                });
                proposalsContent.innerHTML = html;
            } catch (error) {
                console.warn('Proposals failed:', error);
            }
        }

        async function loadContext() {
            try {
                const response = await fetch('/api/v1/user/context');
                if (!response.ok) return;

                const data = await response.json();
                const patterns = data.patterns;

                if (patterns.length === 0) {
                    contextContent.innerHTML = '<div style="font-size: 0.8rem; opacity: 0.6;">Observando hábitos...</div>';
                    return;
                }

                let html = '';
                patterns.forEach(p => {
                    let label = p.type.toUpperCase();
                    let info = "";
                    if (p.type === "routine") info = `${p.data.routine_type}: ${p.data.chip}`;
                    else if (p.type === "habit") info = `Secuencia: ${p.data.chips.join(' > ')}`;
                    else info = `${p.data.preference_type}: ${p.data.chip || p.data.style}`;

                    html += `
                        <div class="insight-item">
                            <span class="insight-label">${label}</span>
                            <span>${info}</span>
                        </div>
                    `;
                });
                contextContent.innerHTML = html;
            } catch (error) {
                console.warn('Context failed:', error);
            }
        }

        const voiceBtn = document.getElementById('voice-btn');
        const visualArea = document.getElementById('ai-visual-response');
        const multimodalIndicator = document.getElementById('ai-multimodal-indicator');

        // Voice Simulation
        let isListening = false;
        voiceBtn.addEventListener('click', () => {
            isListening = !isListening;
            if (isListening) {
                voiceBtn.style.background = 'rgba(0, 212, 255, 0.2)';
                multimodalIndicator.style.opacity = '1';
                aiInput.placeholder = "Escuchando...";

                // Simulate voice command after 2 seconds
                setTimeout(() => {
                    if (isListening) {
                        aiInput.value = "Abrir chip-finanzas y añadir boton pdf";
                        stopListening();
                        sendToAI();
                    }
                }, 2000);
            } else {
                stopListening();
            }
        });

        function stopListening() {
            isListening = false;
            voiceBtn.style.background = 'none';
            multimodalIndicator.style.opacity = '0';
            aiInput.placeholder = "Escribe un comando...";
        }

        function renderVisualResponse(payload) {
            if (!payload || !payload.type) return;

            // Clear previous visual
            visualArea.innerHTML = '';

            const card = document.createElement('div');
            card.style.background = 'rgba(255,255,255,0.05)';
            card.style.border = '1px dashed var(--accent-color)';
            card.style.borderRadius = '12px';
            card.style.padding = '10px';
            card.style.fontSize = '0.8rem';

            if (payload.type.startsWith('chart')) {
                card.innerHTML = `<strong>${payload.title}</strong><div style="height: 5px; background: var(--accent-color); width: 80%; margin: 10px 0; border-radius: 5px;"></div>`;
            } else {
                card.innerHTML = `<strong>${payload.title || 'Visual'}</strong><p>${payload.data || ''}</p>`;
            }

            visualArea.appendChild(card);
            setTimeout(() => card.style.opacity = "1", 100);
        }

        async function sendToAI() {
            const message = aiInput.value.trim();
            if (!message) return;

            // Add user message to UI
            addMessage('user', message);
            aiInput.value = '';

            try {
                const token = localStorage.getItem('omniweb_token') || 'local-os-admin-token';

                const response = await fetch('/api/v1/ai-host/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessage('ai', data.message || "Comando procesado correctamente.");

                    // Handle Visual Payload if present
                    if (data.payload && data.payload.visual) {
                        renderVisualResponse(data.payload.visual);
                    }

                    // Reload both chips and insights
                    setTimeout(() => {
                        loadChips();
                        loadInsights();
                        loadProposals();
                        loadContext();
                    }, 1000);
                } else {
                    addMessage('ai', `Error: ${data.detail || 'Fallo en la comunicación'}`);
                }
            } catch (error) {
                addMessage('ai', "Error al conectar con el AI Host.");
            }
        }

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendBtn.addEventListener('click', sendToAI);
        aiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendToAI();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadChips();
            loadInsights();
            loadProposals();
            loadContext();
        });
    </script>
</body>

</html>
